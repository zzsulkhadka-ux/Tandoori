<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tandoori</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.161.0/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
</head>
<body>

    <canvas id="bg-canvas"></canvas>

    <main>
        <section class="hero">
            <div class="content">
                <h1>TANDOORI</h1>
                <p>The Art of Charcoal & Clay</p>
                <button>Explore Menu</button>
            </div>
        </section>

        <section class="about">
            <div class="content">
                <h2>Ancient Traditions</h2>
                <p>Our Tandoor ovens are hand-crafted from Himalayan clay, firing at 900°F to lock in flavors that modern ovens can't touch.</p>
            </div>
        </section>

        <section class="menu">
            <div class="content">
                <h2>The Sizzle</h2>
                <p>From succulent Tikka to buttery Naan, every dish carries the soul of the fire.</p>
                <button>Book a Table</button>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
